<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wordly — A Lexicon</title>
  <meta name="description" content="Look up any English word, hear it spoken, and file the ones worth keeping.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500;1,600&family=Source+Serif+4:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="app-container">

    <header class="app-header">
      <div class="logo-group">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
          <path d="M4 4.5C4 3.7 4.7 3 5.5 3H12v18H5.5c-.8 0-1.5-.7-1.5-1.5v-15Z"/>
          <path d="M20 4.5c0-.8-.7-1.5-1.5-1.5H12v18h6.5c.8 0 1.5-.7 1.5-1.5v-15Z"/>
          <path d="M12 3v18"/>
        </svg>
        <div>
          <span class="logo-eyebrow">Vol. I &middot; A&ndash;Z</span>
          <h1>Wordly</h1>
        </div>
      </div>
      <div class="header-marks">
        <span class="vol-tag">ref. lx&ndash;04</span>
        <button id="theme-toggle" class="theme-btn" aria-label="Switch to dark display mode" aria-pressed="false">
          <span class="mode-icon" aria-hidden="true">
            <svg class="moon-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5Z"/></svg>
            <svg class="sun-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="4"/><path d="M12 2.5v2M12 19.5v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2.5 12h2M19.5 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          </span>
        </button>
      </div>
    </header>

    <main>
      <label class="search-label" for="word-input">Search the catalog</label>

      <form id="search-form" class="search-group" role="search">
        <input
          type="text"
          id="word-input"
          placeholder="Type any English word&hellip;"
          autocomplete="off"
          spellcheck="true"
          required
        >
        <button type="submit" class="search-btn" aria-label="Submit word search query">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="10.5" cy="10.5" r="6.5"/>
            <path d="M20 20l-4.8-4.8"/>
          </svg>
        </button>
      </form>

      <section id="message-container" class="message-section" aria-live="polite"></section>

      <section id="results-container" class="hidden" aria-live="assertive"></section>

      <section class="favorites-section">
        <div class="favorites-header">
          <h2>Cards on file</h2>
          <span id="fav-count" class="favorites-count">0</span>
        </div>
        <div id="favorites-grid" class="favorites-grid"></div>
      </section>
    </main>
  </div>

  <script src="js/index.js"></script>
</body>
</html>
